<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>振動パフォーマー</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./app.js"></script>
  </head>
  <body>
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
      <symbol id="icon-monitor" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
      </symbol>
      <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </symbol>
      <symbol id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </symbol>
      <symbol id="icon-sparkles" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
      </symbol>
      <symbol id="icon-hand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
      </symbol>
      <symbol id="icon-joystick" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
      </symbol>
      <symbol id="icon-keyboard" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="20" height="12" rx="2"/><line x1="6" y1="10" x2="6" y2="10"/><line x1="10" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="14" y2="10"/><line x1="18" y1="10" x2="18" y2="10"/><line x1="6" y1="14" x2="6" y2="14"/><line x1="18" y1="14" x2="18" y2="14"/>
      </symbol>
      <symbol id="icon-wand-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 4V2"/><path d="M15 16v-2"/><path d="M8 9h2"/><path d="M20 9h2"/><path d="M17.8 11.8 19 13"/><path d="M15 9h0"/><path d="M17.8 6.2 19 5"/><path d="m3 21 9-9"/><path d="M12.2 6.2 11 5"/>
      </symbol>
      <symbol id="icon-circle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
      </symbol>
      <symbol id="icon-square" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
      </symbol>
      <symbol id="icon-trash-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
      </symbol>
      <symbol id="icon-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </symbol>
      <symbol id="icon-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
      </symbol>
      <symbol id="icon-download" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </symbol>
      <symbol id="icon-folder-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5c0-1.1.9-2 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v2"/>
      </symbol>
    </svg>
    <main class="app-shell">
      <section class="hero-panel spring-in">
        <div class="title-row">
          <div>
            <p class="eyebrow">Mickywa Vibe Lab</p>
            <h1 id="appTitle" data-i18n="appTitle">震动演奏机</h1>
          </div>

          <div class="top-actions">
            <div class="language-switch" role="group" aria-label="Language">
              <button class="seg-option" type="button" data-lang="zh" aria-pressed="false">中</button>
              <button class="seg-option" type="button" data-lang="en" aria-pressed="false">EN</button>
              <button class="seg-option is-active" type="button" data-lang="ja" aria-pressed="true">日</button>
            </div>

            <div class="theme-menu">
              <button class="icon-button theme-toggle" id="themeToggle" type="button" aria-expanded="false" data-i18n-aria="themeMenu">
                <svg class="icon" width="18" height="18"><use href="#icon-monitor"/></svg>
              </button>
              <div class="menu-popover" id="themeMenu" role="menu" hidden>
                <button type="button" role="menuitemradio" data-theme-option="system" aria-checked="true">
                  <svg class="icon" width="18" height="18"><use href="#icon-monitor"/></svg>
                  <span data-i18n="themeSystem">跟随系统</span>
                </button>
                <button type="button" role="menuitemradio" data-theme-option="light" aria-checked="false">
                  <svg class="icon" width="18" height="18"><use href="#icon-sun"/></svg>
                  <span data-i18n="themeLight">亮色</span>
                </button>
                <button type="button" role="menuitemradio" data-theme-option="dark" aria-checked="false">
                  <svg class="icon" width="18" height="18"><use href="#icon-moon"/></svg>
                  <span data-i18n="themeDark">暗色</span>
                </button>
              </div>
            </div>
          </div>
        </div>

      </section>

      <section class="studio-grid">
        <article class="curve-panel panel spring-in">
          <div class="section-head">
            <div>
              <p class="eyebrow" data-i18n="curveEyebrow">Curve Editor</p>
              <h2 data-i18n="curveTitle">曲线</h2>
            </div>
            <div class="section-actions">
              <span class="pill"><span data-i18n="speedLabel">录制速度</span> <strong>1/3</strong></span>
              <button class="action compact" id="smoothBtn" type="button" data-i18n-title="shortcutSmooth">
                <svg class="icon" width="18" height="18"><use href="#icon-wand-2"/></svg>
                <span data-i18n="smooth">平滑</span>
              </button>
            </div>
          </div>
          <canvas id="curveCanvas" width="1200" height="520"></canvas>
          <div class="hint-line" data-i18n="curveHint">拖动曲线上的点来手动调整振幅</div>
        </article>

        <article class="play-pad panel spring-in">
          <div class="section-head">
            <div>
              <p class="eyebrow" data-i18n="performanceEyebrow">Performance</p>
              <h2 data-i18n="performanceTitle">演奏</h2>
            </div>
            <div class="section-actions">
              <div class="input-menu">
                <button class="action compact menu-trigger" id="inputToggle" type="button" aria-expanded="false" data-i18n-aria="inputModeGroup">
                  <svg class="icon" width="18" height="18"><use href="#icon-sparkles"/></svg>
                  <span id="inputMode">智能：摇杆</span>
                </button>
                <div class="menu-popover" id="inputMenu" role="menu" hidden>
                  <button type="button" role="menuitemradio" data-input-choice="auto" aria-checked="true">
                    <svg class="icon" width="18" height="18"><use href="#icon-sparkles"/></svg>
                    <span data-i18n="inputAuto">智能</span>
                  </button>
                  <button type="button" role="menuitemradio" data-input-choice="touch" aria-checked="false">
                    <svg class="icon" width="18" height="18"><use href="#icon-hand"/></svg>
                    <span data-i18n="inputTouch">触屏</span>
                  </button>
                  <button type="button" role="menuitemradio" data-input-choice="joystick" aria-checked="false">
                    <svg class="icon" width="18" height="18"><use href="#icon-joystick"/></svg>
                    <span data-i18n="inputJoystick">摇杆</span>
                  </button>
                  <button type="button" role="menuitemradio" data-input-choice="keyboard" aria-checked="false">
                    <svg class="icon" width="18" height="18"><use href="#icon-keyboard"/></svg>
                    <span data-i18n="inputKeyboard">键盘</span>
                  </button>
                </div>
              </div>
              <span class="pill" id="recordState">待录制</span>
            </div>
          </div>

          <div class="slider-wrap input-surface" id="sliderWrap">
            <input id="intensitySlider" class="intensity-slider" type="range" min="0" max="100" value="0" data-i18n-aria="amplitudeLabel" />
            <div class="slider-track">
              <div class="slider-fill" id="sliderFill"></div>
              <div class="slider-thumb" id="sliderThumb"></div>
            </div>
          </div>

          <div class="wheel-pad input-surface" id="wheelPad" tabindex="0" data-i18n-aria="wheelControl" hidden>
            <div class="wheel-orbit">
              <span id="wheelValue">0</span>
            </div>
            <p data-i18n="wheelHelp">桌面端在这里滚动鼠标滚轮</p>
          </div>

          <div class="keyboard-pad input-surface" id="keyboardPad" data-i18n-aria="keyboardControl" hidden>
            <button type="button" data-key-level="25"><kbd>1</kbd><span>25%</span></button>
            <button type="button" data-key-level="50"><kbd>2</kbd><span>50%</span></button>
            <button type="button" data-key-level="75"><kbd>3</kbd><span>75%</span></button>
            <button type="button" data-key-level="100"><kbd>4</kbd><span>100%</span></button>
          </div>

          <div class="control-row">
            <button class="action primary" id="recordBtn" type="button" data-i18n-title="shortcutRecord">
              <svg class="icon" width="18" height="18"><use href="#icon-circle"/></svg>
              <span data-i18n="startRecord">开始录制</span>
            </button>
            <button class="action" id="stopBtn" type="button" disabled data-i18n-title="shortcutStop">
              <svg class="icon" width="18" height="18"><use href="#icon-square"/></svg>
              <span data-i18n="stop">停止</span>
            </button>
            <button class="action" id="clearBtn" type="button" data-i18n-title="shortcutClear">
              <svg class="icon" width="18" height="18"><use href="#icon-trash-2"/></svg>
              <span data-i18n="clear">清空</span>
            </button>
          </div>
        </article>

        <article class="library-panel panel spring-in">
          <div class="section-head">
            <div>
              <p class="eyebrow" data-i18n="takesEyebrow">Takes</p>
              <h2 data-i18n="takesTitle">片段</h2>
            </div>
          </div>

          <div class="takes-list" id="takesList">
            <div class="take-item" id="currentTake" aria-live="polite">
              <span>还没有录制</span>
              <strong>--:--.---</strong>
            </div>
          </div>

          <textarea id="jsonOutput" spellcheck="false" data-i18n-aria="jsonOutputLabel" data-i18n-placeholder="jsonPlaceholder"></textarea>
        </article>
      </section>
    </main>
  </body>
</html>
