<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>振動パフォーマー</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-panel spring-in">
        <div class="title-row">
          <div>
            <p class="eyebrow">Mickywa Vibe Lab</p>
            <h1 id="appTitle" data-i18n="appTitle">震动演奏机</h1>
          </div>

          <div class="top-actions">
            <div class="language-switch" role="group" aria-label="Language">
              <button class="seg-option" type="button" data-lang="zh" aria-pressed="false">中</button>
              <button class="seg-option" type="button" data-lang="en" aria-pressed="false">EN</button>
              <button class="seg-option is-active" type="button" data-lang="ja" aria-pressed="true">日</button>
            </div>

            <div class="theme-menu">
              <button class="icon-button theme-toggle" id="themeToggle" type="button" aria-expanded="false" data-i18n-aria="themeMenu">
                <i data-lucide="monitor" aria-hidden="true"></i>
              </button>
              <div class="menu-popover" id="themeMenu" role="menu" hidden>
                <button type="button" role="menuitemradio" data-theme-option="system" aria-checked="true">
                  <i data-lucide="monitor" aria-hidden="true"></i>
                  <span data-i18n="themeSystem">跟随系统</span>
                </button>
                <button type="button" role="menuitemradio" data-theme-option="light" aria-checked="false">
                  <i data-lucide="sun" aria-hidden="true"></i>
                  <span data-i18n="themeLight">亮色</span>
                </button>
                <button type="button" role="menuitemradio" data-theme-option="dark" aria-checked="false">
                  <i data-lucide="moon" aria-hidden="true"></i>
                  <span data-i18n="themeDark">暗色</span>
                </button>
              </div>
            </div>
          </div>
        </div>

      </section>

      <section class="studio-grid">
        <article class="curve-panel panel spring-in">
          <div class="section-head">
            <div>
              <p class="eyebrow" data-i18n="curveEyebrow">Curve Editor</p>
              <h2 data-i18n="curveTitle">曲线</h2>
            </div>
            <div class="section-actions">
              <span class="pill"><span data-i18n="speedLabel">录制速度</span> <strong>1/3</strong></span>
              <button class="action compact" id="smoothBtn" type="button" data-i18n-title="shortcutSmooth">
                <i data-lucide="wand-2" aria-hidden="true"></i>
                <span data-i18n="smooth">平滑</span>
              </button>
            </div>
          </div>
          <canvas id="curveCanvas" width="1200" height="520"></canvas>
          <div class="hint-line" data-i18n="curveHint">拖动曲线上的点来手动调整振幅</div>
        </article>

        <article class="play-pad panel spring-in">
          <div class="section-head">
            <div>
              <p class="eyebrow" data-i18n="performanceEyebrow">Performance</p>
              <h2 data-i18n="performanceTitle">演奏</h2>
            </div>
            <div class="section-actions">
              <div class="input-menu">
                <button class="action compact menu-trigger" id="inputToggle" type="button" aria-expanded="false" data-i18n-aria="inputModeGroup">
                  <i data-lucide="sparkles" aria-hidden="true"></i>
                  <span id="inputMode">智能：摇杆</span>
                </button>
                <div class="menu-popover" id="inputMenu" role="menu" hidden>
                  <button type="button" role="menuitemradio" data-input-choice="auto" aria-checked="true">
                    <i data-lucide="sparkles" aria-hidden="true"></i>
                    <span data-i18n="inputAuto">智能</span>
                  </button>
                  <button type="button" role="menuitemradio" data-input-choice="touch" aria-checked="false">
                    <i data-lucide="hand" aria-hidden="true"></i>
                    <span data-i18n="inputTouch">触屏</span>
                  </button>
                  <button type="button" role="menuitemradio" data-input-choice="joystick" aria-checked="false">
                    <i data-lucide="joystick" aria-hidden="true"></i>
                    <span data-i18n="inputJoystick">摇杆</span>
                  </button>
                  <button type="button" role="menuitemradio" data-input-choice="keyboard" aria-checked="false">
                    <i data-lucide="keyboard" aria-hidden="true"></i>
                    <span data-i18n="inputKeyboard">键盘</span>
                  </button>
                </div>
              </div>
              <span class="pill" id="recordState">待录制</span>
            </div>
          </div>

          <div class="slider-wrap input-surface" id="sliderWrap">
            <input id="intensitySlider" class="intensity-slider" type="range" min="0" max="100" value="0" data-i18n-aria="amplitudeLabel" />
            <div class="slider-track">
              <div class="slider-fill" id="sliderFill"></div>
              <div class="slider-thumb" id="sliderThumb"></div>
            </div>
          </div>

          <div class="wheel-pad input-surface" id="wheelPad" tabindex="0" data-i18n-aria="wheelControl" hidden>
            <div class="wheel-orbit">
              <span id="wheelValue">0</span>
            </div>
            <p data-i18n="wheelHelp">桌面端在这里滚动鼠标滚轮</p>
          </div>

          <div class="keyboard-pad input-surface" id="keyboardPad" data-i18n-aria="keyboardControl" hidden>
            <button type="button" data-key-level="25"><kbd>1</kbd><span>25%</span></button>
            <button type="button" data-key-level="50"><kbd>2</kbd><span>50%</span></button>
            <button type="button" data-key-level="75"><kbd>3</kbd><span>75%</span></button>
            <button type="button" data-key-level="100"><kbd>4</kbd><span>100%</span></button>
          </div>

          <div class="control-row">
            <button class="action primary" id="recordBtn" type="button" data-i18n-title="shortcutRecord">
              <i data-lucide="circle" aria-hidden="true"></i>
              <span data-i18n="startRecord">开始录制</span>
            </button>
            <button class="action" id="stopBtn" type="button" disabled data-i18n-title="shortcutStop">
              <i data-lucide="square" aria-hidden="true"></i>
              <span data-i18n="stop">停止</span>
            </button>
            <button class="action" id="clearBtn" type="button" data-i18n-title="shortcutClear">
              <i data-lucide="trash-2" aria-hidden="true"></i>
              <span data-i18n="clear">清空</span>
            </button>
          </div>
        </article>

        <article class="library-panel panel spring-in">
          <div class="section-head">
            <div>
              <p class="eyebrow" data-i18n="takesEyebrow">Takes</p>
              <h2 data-i18n="takesTitle">片段</h2>
            </div>
          </div>

          <div class="takes-list" id="takesList">
            <div class="take-item" id="currentTake" aria-live="polite">
              <span>还没有录制</span>
              <strong>--:--.---</strong>
            </div>
          </div>

          <textarea id="jsonOutput" spellcheck="false" data-i18n-aria="jsonOutputLabel" data-i18n-placeholder="jsonPlaceholder"></textarea>
        </article>
      </section>
    </main>
  </body>
</html>
